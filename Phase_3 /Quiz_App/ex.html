<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quiz App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #quiz-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .option-button {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            text-align: left;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        .option-button:hover {
            background-color: #e2e8f0;
        }

        #next-btn {
            margin-top: 15px;
            padding: 10px 15px;
            cursor: pointer;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div id="quiz-container">
        <div id="quiz-content"></div>
    </div>

    <script>
        const quizQuestions = [
            { question: "Capital of France?", options: ["Berlin", "Madrid", "Paris", "Rome"], answer: "Paris" },
            { question: "Red Planet?", options: ["Earth", "Mars", "Jupiter", "Venus"], answer: "Mars" },
            { question: "Largest ocean?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], answer: "Pacific" }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;
        const quizContent = document.getElementById('quiz-content');

        function renderQuestion() {
            const q = quizQuestions[currentQuestionIndex];
            let html = `<h2>Question ${currentQuestionIndex + 1} of ${quizQuestions.length}</h2>`;
            html += `<p>${q.question}</p>`;
            q.options.forEach(option => {
                html += `<button class="option-button" onclick="selectOption('${option}')">${option}</button>`;
            });
            html += `<button id="next-btn" onclick="handleSubmit()">Next</button>`;
            quizContent.innerHTML = html;
        }

        function selectOption(option) {
            selectedOption = option;
            // Highlight selected
            document.querySelectorAll('.option-button').forEach(btn => {
                btn.style.backgroundColor = btn.textContent === option ? '#3b82f6' : '#f9f9f9';
                btn.style.color = btn.textContent === option ? 'white' : 'black';
            });
        }

        function handleSubmit() {
            if (selectedOption === null) {
                alert("Please select an option!");
                return;
            }
            if (selectedOption === quizQuestions[currentQuestionIndex].answer) {
                score++;
            }
            selectedOption = null;
            currentQuestionIndex++;
            if (currentQuestionIndex < quizQuestions.length) {
                renderQuestion();
            } else {
                renderResults();
            }
        }

        function renderResults() {
            quizContent.innerHTML = `<h2>Quiz Complete!</h2>
                           <p>Your Score: ${score} / ${quizQuestions.length}</p>
                           <button onclick="restartQuiz()">Try Again</button>`;
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            renderQuestion();
        }

        // Initialize
        renderQuestion();
    </script>

</body>

</html>
